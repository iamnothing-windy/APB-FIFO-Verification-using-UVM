<svg width="1280" height="820" viewBox="0 0 1280 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">APB FIFO UVM Verification Architecture</title>
  <desc id="desc">Block diagram showing UVM test, environment, agent, sequencer, driver, monitor, APB interface, DUT, scoreboard, and coverage connections.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #475569; }
      .domain-title { font: 700 15px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: 0.04em; }
      .box-title { font: 700 16px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .box-text { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 400 11px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 12px Arial, Helvetica, sans-serif; fill: #334155; }
      .container { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .uvm { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .agent { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 2; rx: 14; }
      .dut { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .score { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .cov { fill: #fdf2f8; stroke: #f472b6; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .iface { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .top { fill: #fefce8; stroke: #eab308; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .line { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .line-blue { fill: none; stroke: #2563eb; stroke-width: 2.4; marker-end: url(#arrow-blue); }
      .line-green { fill: none; stroke: #16a34a; stroke-width: 2.4; marker-end: url(#arrow-green); }
      .line-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .bus-label { font: 700 11px Arial, Helvetica, sans-serif; fill: #2563eb; }
      .resp-label { font: 700 11px Arial, Helvetica, sans-serif; fill: #16a34a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="820"/>
  <text class="title" x="50" y="52">APB FIFO UVM Verification Architecture</text>
  <text class="subtitle" x="50" y="78">Self-checking UVM testbench with directed/random stimulus, APB bus driver, monitor, scoreboard, and coverage collector.</text>

  <rect class="container" x="35" y="120" width="805" height="575"/>
  <text class="domain-title" x="60" y="150">UVM VERIFICATION ENVIRONMENT</text>

  <rect class="container" x="870" y="120" width="365" height="575"/>
  <text class="domain-title" x="895" y="150">TESTBENCH TOP / RTL DOMAIN</text>

  <rect class="top" x="910" y="180" width="285" height="78"/>
  <text class="box-title" x="945" y="212">tb/top.sv</text>
  <text class="box-text" x="945" y="234">instantiates DUT + apb_if</text>
  <text class="box-text" x="945" y="250">sets virtual interface in config_db</text>

  <rect class="uvm" x="70" y="185" width="250" height="82"/>
  <text class="box-title" x="102" y="218">UVM Test</text>
  <text class="box-text" x="102" y="241">apb_fifo_full_regression_test</text>

  <rect class="uvm" x="70" y="315" width="250" height="82"/>
  <text class="box-title" x="96" y="348">Sequence</text>
  <text class="box-text" x="96" y="371">directed + random apb_trans</text>

  <rect class="agent" x="365" y="180" width="435" height="335"/>
  <text class="domain-title" x="390" y="210">apb_agent</text>

  <rect class="uvm" x="400" y="245" width="165" height="78"/>
  <text class="box-title" x="424" y="278">Sequencer</text>
  <text class="box-text" x="424" y="300">apb_sequencer</text>

  <rect class="uvm" x="605" y="245" width="165" height="78"/>
  <text class="box-title" x="644" y="278">Driver</text>
  <text class="box-text" x="633" y="300">apb_driver</text>

  <rect class="uvm" x="605" y="405" width="165" height="78"/>
  <text class="box-title" x="637" y="438">Monitor</text>
  <text class="box-text" x="631" y="460">apb_monitor</text>

  <rect class="score" x="170" y="555" width="250" height="95"/>
  <text class="box-title" x="204" y="590">Scoreboard</text>
  <text class="box-text" x="204" y="612">independent FIFO queue model</text>
  <text class="box-text" x="204" y="630">checks data, count, status, errors</text>

  <rect class="cov" x="505" y="555" width="250" height="95"/>
  <text class="box-title" x="548" y="590">Coverage</text>
  <text class="box-text" x="548" y="612">cmd, addr, slverr, count bins</text>
  <text class="box-text" x="548" y="630">event and cross coverage</text>

  <rect class="iface" x="920" y="330" width="220" height="130"/>
  <text class="box-title" x="971" y="366">APB Interface</text>
  <text class="box-text" x="970" y="389">apb_if + clocking blocks</text>
  <text class="box-text" x="970" y="407">protocol assertions</text>
  <text class="box-text" x="970" y="425">virtual interface handle</text>

  <rect class="dut" x="935" y="540" width="190" height="95"/>
  <text class="box-title" x="975" y="575">DUT RTL</text>
  <text class="box-text" x="973" y="598">apb_fifo_slave</text>
  <text class="box-text" x="973" y="616">DATA / STATUS / COUNT</text>

  <path class="line" d="M 195 267 L 195 315"/>
  <text class="label" x="211" y="295">starts</text>

  <path class="line" d="M 320 356 L 400 284"/>
  <text class="label" x="326" y="320">seq items</text>

  <path class="line" d="M 565 284 L 605 284"/>
  <text class="label" x="572" y="270">pull</text>

  <path class="line-blue" d="M 770 284 C 835 284 850 365 920 382"/>
  <text class="bus-label" x="795" y="305">drive APB transfer</text>

  <path class="line-blue" d="M 1030 460 L 1030 540"/>
  <text class="bus-label" x="1042" y="505">request signals</text>

  <path class="line-green" d="M 990 540 L 990 460"/>
  <text class="resp-label" x="875" y="505">response signals</text>

  <path class="line-green" d="M 920 425 C 840 425 835 444 770 444"/>
  <text class="resp-label" x="792" y="432">sample completed transfer</text>

  <path class="line" d="M 605 444 C 500 444 415 520 335 555"/>
  <text class="label" x="430" y="515">analysis_port</text>

  <path class="line" d="M 688 483 C 695 520 675 535 650 555"/>
  <text class="label" x="678" y="526">analysis_port</text>

  <path class="line-dashed" d="M 960 258 C 875 185 755 197 700 245"/>
  <text class="small" x="735" y="188">uvm_config_db provides vif</text>

  <path class="line-dashed" d="M 1045 258 L 1045 330"/>

  <rect x="70" y="720" width="1140" height="55" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="747" r="7" fill="#2563eb"/>
  <text class="small" x="112" y="751">Stimulus/APB request path</text>
  <circle cx="282" cy="747" r="7" fill="#16a34a"/>
  <text class="small" x="298" y="751">DUT response/monitoring path</text>
  <line x1="500" y1="747" x2="545" y2="747" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <text class="small" x="560" y="751">Configuration path</text>
  <text class="small" x="760" y="751">Scoreboard is self-checking and does not use DUT internal state.</text>
</svg>
